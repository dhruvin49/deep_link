<script>

const finalUrl = "https://t.me/+lOthLZQi4R5iZjQ1";

function redirectUser() {

  const ua = navigator.userAgent;

  // Instagram Android
  if (ua.includes("Instagram") && ua.includes("Android")) {

    window.location.href =
      "intent://t.me/+lOthLZQi4R5iZjQ1#Intent;package=org.telegram.messenger;scheme=https;end";

  }

  // Instagram iPhone
  else if (ua.includes("Instagram") && /iPhone|iPad/i.test(ua)) {

    setTimeout(() => {
      window.location.href = finalUrl;
    }, 1000);

  }

  // Normal Browser
  else {

    window.location.href = finalUrl;

  }
}

window.onload = redirectUser;

</script>
