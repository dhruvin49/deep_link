<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Opening Telegram...</title>

<style>

body{
  margin:0;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.box{
  max-width:400px;
}

a{
  display:inline-block;
  margin-top:20px;
  padding:14px 24px;
  background:white;
  color:black;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

</style>

<script>

const telegramLink = "tg://join?invite=lOthLZQi4R5iZjQ1";

const playStoreLink =
"https://play.google.com/store/apps/details?id=org.telegram.messenger";

let appOpened = false;

// Detect app switch
document.addEventListener("visibilitychange", () => {

  if (document.hidden) {
    appOpened = true;
  }

});

function openTelegram() {

  // Try opening Telegram
  window.location.href = telegramLink;

  // Fallback to Play Store ONLY if app didn't open
  setTimeout(() => {

    if (!appOpened) {

      window.location.href = playStoreLink;

    }

  }, 4000);

}

window.onload = openTelegram;

</script>

</head>

<body>

<div class="box">

<h2>Opening Telegram...</h2>

<p>
If nothing happens, tap below.
</p>

<a href="tg://join?invite=lOthLZQi4R5iZjQ1">
Open Telegram
</a>

</div>

</body>
</html>
