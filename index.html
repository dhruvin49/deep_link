<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Opening...</title>

<style>
body{
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  text-align:center;
}

.box{
  padding:20px;
}

a{
  display:inline-block;
  margin-top:20px;
  background:white;
  color:black;
  padding:14px 24px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}
</style>

<script>

const finalUrl = "https://t.me/+lOthLZQi4R5iZjQ1";

function redirectUser() {

  const ua = navigator.userAgent;

  // Android Instagram
  if (ua.includes("Instagram") && ua.includes("Android")) {

    window.location.href =
      "intent://google.com#Intent;scheme=https;package=com.android.chrome;end";

  }

  // iPhone Instagram
  else if (ua.includes("Instagram") && /iPhone|iPad/i.test(ua)) {

    setTimeout(() => {
      window.location.href = finalUrl;
    }, 1200);

  }

  // Normal Browser
  else {

    window.location.href = finalUrl;

  }
}

window.onload = redirectUser;

</script>
</head>

<body>

<div class="box">

<h2>Opening Link...</h2>

<p>If nothing happens tap below.</p>

<a href="https://google.com" target="_blank">
Open Now
</a>

</div>

</body>
</html>
